spring:
  jpa:
    hibernate:
      ddl-auto: validate

  # Cache usa Caffeine (in-memory) nos testes — sem necessidade de Redis real.
  # A auto-configuração do Redis é desabilitada para evitar falha de conexão.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  flyway:
    # Em testes, environment=test bloqueia execução do seed de dev
    placeholders:
      environment: test

  # Em testes, OIDC é mockado. JwtDecoder bean é substituído via MockJwtConfig.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/mock-zitadel

tkws:
  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    com.groupws.tkws: DEBUG
    org.testcontainers: INFO
    org.hibernate.SQL: WARN
