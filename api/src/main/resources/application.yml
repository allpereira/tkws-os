spring:
  application:
    name: tkws-api

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tkws}
    username: ${DB_USER:tkws}
    password: ${DB_PASSWORD:tkws}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    # Placeholder usado por R__seed_dev.sql para só rodar em ambiente dev.
    # Em staging/prod, ENVIRONMENT vem do env var e bloqueia o seed.
    placeholders:
      environment: ${ENVIRONMENT:dev}

  cache:
    type: caffeine
    cache-names: feature-flags
    caffeine:
      spec: maximumSize=100,expireAfterWrite=60s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER:http://localhost:8088}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.groupws.tkws: ${LOG_LEVEL:DEBUG}

tkws:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
