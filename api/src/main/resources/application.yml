spring:
  application:
    name: tkws-api

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tkws}
    username: ${DB_USER:tkws}
    password: ${DB_PASSWORD:tkws}
    hikari:
      pool-name: tkws-hikari
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      # Tempo máximo esperando uma conexão livre antes de falhar (em vez de pendurar).
      connection-timeout: 10000        # 10s
      # Recicla conexões antes do idle/lifetime do PostgreSQL/RDS (evita usar conexão morta).
      max-lifetime: 1740000            # 29min (< wait_timeout do PG, tipicamente 30min)
      keepalive-time: 300000           # 5min — mantém conexões idle vivas (NAT/RDS)
      idle-timeout: 600000             # 10min
      validation-timeout: 5000
      # Desliga autocommit no pool + delega o controle ao Hibernate: evita um
      # round-trip de "SET autocommit" por transação (combina com
      # provider_disables_autocommit abaixo).
      auto-commit: false

  jpa:
    hibernate:
      # Flyway é o dono do schema (ADR). Em produção use `validate` (default abaixo):
      # Hibernate só confere que as entidades batem com o schema migrado, sem alterá-lo.
      # Dev pode sobrescrever com JPA_DDL_AUTO=update.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false               # já evita lazy-loading no render; mantém sessão curta
    properties:
      hibernate:
        format_sql: false
        # Batching de INSERT/UPDATE: agrupa statements e reduz round-trips ao banco.
        jdbc:
          batch_size: 50
          time_zone: UTC              # grava timestamps em UTC, consistente entre instâncias
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        # Mitiga N+1 ao carregar coleções/associações lazy (ex.: contatos de pessoas):
        # busca em lotes de 25 em vez de 1 query por entidade.
        default_batch_fetch_size: 25
        # Reusa o plano de query quando a lista do IN tem tamanhos próximos (padding).
        query:
          in_clause_parameter_padding: true
        # Hikari já desliga autocommit; deixa o Hibernate gerenciar — economiza round-trip.
        connection:
          provider_disables_autocommit: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    # Placeholder usado por V7__seed_dev.sql para só rodar em ambiente dev.
    # Em staging/prod, ENVIRONMENT vem do env var e bloqueia o seed.
    placeholders:
      environment: ${ENVIRONMENT:dev}

  cache:
    type: caffeine
    cache-names: feature-flags
    caffeine:
      spec: maximumSize=100,expireAfterWrite=60s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      # Timeouts curtos: cache/sessão nunca devem pendurar uma request.
      timeout: 2s
      connect-timeout: 2s
      lettuce:
        shutdown-timeout: 100ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER:http://localhost:8088}

  # SMTP — em dev local apontamos pro Mailpit (UI http://localhost:8025).
  # Em staging/prod, configurar via env vars (SMTP_HOST/PORT/USER/PASS).
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.groupws.tkws: ${LOG_LEVEL:DEBUG}

tkws:
  flyway:
    # Só efetivo quando spring.flyway.placeholders.environment=dev (ENVIRONMENT padrão local).
    # Repara checksums antes de migrar — evita Validate failed após editar migration já aplicada.
    repair-on-migrate: ${TKWS_FLYWAY_REPAIR_ON_MIGRATE:true}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

  zitadel:
    issuer: ${ZITADEL_ISSUER:http://localhost:8088}
    # PAT do machine user `login-client` (mesmo arquivo usado pelo Vite proxy do login app).
    # Extrair via `bash scripts/extract-login-pat.sh`.
    login-client-pat-path: ${ZITADEL_LOGIN_CLIENT_PAT_PATH:/zitadel/bootstrap/login-client.pat}
    # Project ID do app TKWS OS no Zitadel (usado pra atribuir role do convidado).
    # Em dev, pegar via `Console → Projects → TKWS OS`.
    project-id: ${ZITADEL_PROJECT_ID:}

  invites:
    # Janela de validade do convite (formato ISO-8601 Duration). Default 7 dias.
    ttl: ${INVITE_TTL:P7D}
    # URL base da tela /accept-invite na SPA login.
    accept-base-url: ${INVITE_ACCEPT_URL:http://localhost:5174/accept-invite}
    mail:
      from: ${INVITE_MAIL_FROM:no-reply@tkws.com.br}
    admin:
      log-tag: ${INVITE_ADMIN_LOG_TAG:[INVITE-ADMIN-NOTIFY]}
