# Docker Compose para DESENVOLVIMENTO LOCAL
# Uso: docker compose up -d
# Acesso: Frontend http://localhost:5173 | API http://localhost:8080 | Zitadel http://localhost:8088

services:

  postgres:
    image: postgres:16-alpine
    container_name: tkws-postgres
    environment:
      POSTGRES_DB: tkws
      POSTGRES_USER: tkws
      POSTGRES_PASSWORD: tkws
    # Host 5433 evita conflito com Postgres local (5432). Dentro do container: 5432.
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-zitadel-db.sql:/docker-entrypoint-initdb.d/init-zitadel-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tkws"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tkws

  redis:
    image: redis:7-alpine
    container_name: tkws-redis
    # Host 6380 evita conflito com Redis local (6379). Dentro do container: 6379.
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tkws

  zitadel:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION:-v4.15.0}
    container_name: tkws-zitadel
    command: 'start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled'
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: tkws
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: tkws
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: tkws
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: tkws
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8088
      ZITADEL_PORT: 8088
      # CORS para o login app customizado (porta 5174) e o frontend principal (5173)
      ZITADEL_HTTP_CORS_ALLOWEDORIGINS: "http://localhost:5173,http://localhost:5174"
      ZITADEL_HTTP_CORS_ALLOWCREDENTIALS: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@tkws.local
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Admin@123456"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      # Login V2 (obrigatório no Zitadel 4.x) — UI customizada em login/ (porta 5174 em dev)
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: TKWS Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:5174/
      # Zitadel appende o authRequestId diretamente após o '=' — o parâmetro deve chamar authRequestId
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:5174/login?authRequestId=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:5174/logout?post_logout_redirect=
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    # "zitadel ready" exige Login V2 + PAT; em instâncias já existentes use /debug/healthz.
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tkws

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${ZITADEL_VERSION:-v4.15.0}
    container_name: tkws-zitadel-login
    environment:
      ZITADEL_API_URL: http://zitadel:8088
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    healthcheck:
      test:
        [
          "CMD",
          "/bin/sh",
          "-c",
          "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy",
        ]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    depends_on:
      zitadel:
        condition: service_started
    networks:
      - tkws

  zitadel-gateway:
    image: caddy:2-alpine
    container_name: tkws-zitadel-gateway
    ports:
      - "8088:8088"
    volumes:
      - ./docker/zitadel/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      zitadel:
        condition: service_started
      zitadel-login:
        condition: service_started
    networks:
      - tkws

  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
    container_name: tkws-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tkws
      DB_USER: tkws
      DB_PASSWORD: tkws
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ZITADEL_ISSUER: http://zitadel:8088
      CORS_ORIGINS: http://localhost:5173
      ENVIRONMENT: dev
      LOG_LEVEL: DEBUG
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zitadel:
        condition: service_started
    networks:
      - tkws

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
        VITE_ZITADEL_AUTHORITY: http://localhost:8088
        VITE_ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-replace-after-setup}
        VITE_REDIRECT_URI: http://localhost:5173/callback
    container_name: tkws-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - tkws

volumes:
  postgres-data:
  redis-data:
  zitadel-bootstrap:

networks:
  tkws:
    driver: bridge
